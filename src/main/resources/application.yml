# ==================== OpenAI / LLM 配置 ====================
openai:
  api-key: ${openai.api-key}
  base-url: https://api.deepseek.com
  model: ${openai.model}
  temperature: 0.7
  max-tokens: 393216
  timeout-seconds: 60

# ==================== 记忆系统 ====================
memory:
  short:
    # 上下文窗口最大 token 数（超出后自动对早期轮次进行摘要压缩）
    max-context-tokens: 200000
    # 预留给模型响应的 token 数（从 max-context-tokens 中扣除）
    reserve-tokens: 8000
    # 保留最近 N 轮完整对话不被摘要压缩（至少为 1）
    keep-turns: 3
  long:
    # 是否启用长期记忆
    enabled: true
    # 存储目录
    storage-dir: memory/long
    # 最多保留多少条记忆（超出后淘汰低分条目）
    max-entries: 500
    # 最低重要度阈值（1-10），低于此值的记忆不写入长期存储
    min-importance: 5
    # Embedding 语义向量配置（不启用时退化为纯 BM25 检索）
    embedding:
      enabled: false
      base-url: https://api.openai.com/v1
      api-key: ${embedding.api-key}
      model: text-embedding-3-small
    # 混合检索参数
    retrieval:
      bm25-weight: 0.3         # BM25 在混合评分中的权重 (0~1)
      cliff-multiplier: 2.0    # 断崖检测乘数（越大越不容易截断）
      prefetch-k: 50           # BM25 粗筛候选数
      top-k: 5                 # 每轮检索注入的记忆数
      auto-inject: true        # 是否自动将检索结果注入上下文

# ==================== Steam 配置 ====================
steam:
  # Steam Web API Key (申请地址: https://steamcommunity.com/dev/apikey)
  api-key: ${steam.api-key}

# ==================== 日志级别 ====================
logging:
  level:
    root: INFO
    com.greendam: DEBUG
skill:
  # 技能目录，此处为相对路径
  dir: skills
