# ==================== OpenAI / LLM 配置 ====================
openai:
  api-key: ${openai.api-key}
  base-url: https://api.deepseek.com
  model: ${openai.model}
  temperature: 0.7
  max-tokens: 65535
  timeout-seconds: 60

# ==================== 日志级别 ====================
logging:
  level:
    root: INFO
    com.greendam: DEBUG
